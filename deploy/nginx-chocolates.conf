# ============================================================
# CHOCOLATES WEB - Configuracion Nginx
# Sirve bajo subpath /chocolateswebb
# Dominio: http://192.168.100.215
# ============================================================
# Instalacion:
#   sudo cp nginx-chocolates.conf /etc/nginx/sites-available/chocolates
#   sudo ln -s /etc/nginx/sites-available/chocolates /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name 192.168.100.215;

    # ==========================================
    # FRONTEND PUBLICO
    # ==========================================
    location /chocolateswebb {
        alias /usr/share/nginx/html/chocolateswebb;
        index index.html;
        try_files $uri $uri/ /chocolateswebb/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";

        location ~* \.(jpg|jpeg|png|webp|gif|ico|svg|css|js|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # ==========================================
    # BACKEND API (proxy al contenedor Docker)
    # ==========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_cache_bypass $http_upgrade;

        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Allow-Credentials "true";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ==========================================
    # ARCHIVOS SUBIDOS (uploads)
    # ==========================================
    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================
    # SEGURIDAD
    # ==========================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ (\.env|\.git|\.docker|Dockerfile|compose\.yml) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==========================================
    # COMPRESION
    # ==========================================
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
}
