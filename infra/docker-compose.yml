version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: chocolates-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ../frontend/public-site/dist:/usr/share/nginx/html/public
      - ../frontend/admin-panel/dist:/usr/share/nginx/html/admin
      - ../backend/uploads:/usr/share/nginx/html/uploads
    depends_on:
      - spring-app
    networks:
      - chocolates-network
    restart: unless-stopped

  spring-app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: chocolates-backend
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=192.168.100.215
      - DB_PORT=5432
      - DB_NAME=chocolates_db
      - DB_USER=postgres
      - DB_PASSWORD=086411421
      - JWT_SECRET=YmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckNob2NvbGF0ZXNXZWJBcHBsaWNhdGlvbjIwMjQ=
      - JWT_EXPIRATION=86400000
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=chocolates_minio
      - MINIO_SECRET_KEY=Ch0c0l4t3s_M1n10_2024!
      - MINIO_BUCKET=chocolates-media
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../backend/uploads:/app/uploads
    networks:
      - chocolates-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: chocolates-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=chocolates_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=086411421
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chocolates_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chocolates-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: chocolates-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=chocolates_minio
      - MINIO_ROOT_PASSWORD=Ch0c0l4t3s_M1n10_2024!
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - chocolates-network
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:

networks:
  chocolates-network:
    driver: bridge