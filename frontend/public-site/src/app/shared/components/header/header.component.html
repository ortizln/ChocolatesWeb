<header class="main-header" [ngClass]="{ 'header-scrolled': isScrolled }">
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" routerLink="/" (click)="closeMenu()">
        <img src="assets/images/logo-white.png" alt="Chocolates Artesanales" class="logo-light">
        <img src="assets/images/logo-dark.png" alt="Chocolates Artesanales" class="logo-dark">
        <span class="brand-text">Chocolates Artesanales</span>
      </a>
      <button class="navbar-toggler" type="button" (click)="toggleMenu()" aria-label="Toggle navigation">
        <span class="hamburger" [ngClass]="{ 'is-active': isMenuOpen }">
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </span>
      </button>
      <div class="collapse navbar-collapse" [ngClass]="{ 'show': isMenuOpen }">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">
              <i class="fas fa-home"></i> Inicio
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/nosotros" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-store"></i> Nosotros
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/productos" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-gem"></i> Productos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/galeria" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-images"></i> Galería
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/blog" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-newspaper"></i> Blog
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/eventos" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-calendar-alt"></i> Eventos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/contacto" routerLinkActive="active" (click)="closeMenu()">
              <i class="fas fa-envelope"></i> Contacto
            </a>
          </li>
        </ul>
        <div class="header-actions d-flex align-items-center ms-lg-3">
          <button class="btn btn-icon position-relative" aria-label="Wishlist">
            <i class="fas fa-heart"></i>
            <span class="badge badge-wishlist">0</span>
          </button>
          <button class="btn btn-icon position-relative" aria-label="Cart">
            <i class="fas fa-shopping-bag"></i>
            <span class="badge badge-cart">0</span>
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>
