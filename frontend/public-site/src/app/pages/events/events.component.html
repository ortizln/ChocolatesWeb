<div class="events-page">
  <section class="page-header">
    <div class="container">
      <div class="page-header-content text-center">
        <h1 class="page-title">Eventos</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a routerLink="/">Inicio</a></li>
            <li class="breadcrumb-item active">Eventos</li>
          </ol>
        </nav>
      </div>
    </div>
  </section>

  <section class="events-section">
    <div class="container">
      <!-- Toggle Upcoming/Past -->
      <div class="events-toggle">
        <button class="toggle-btn" [ngClass]="{ 'active': !showPastEvents }" (click)="toggleEvents(false)">
          <i class="fas fa-calendar-check"></i> Próximos Eventos
        </button>
        <button class="toggle-btn" [ngClass]="{ 'active': showPastEvents }" (click)="toggleEvents(true)">
          <i class="fas fa-history"></i> Eventos Pasados
        </button>
      </div>

      <!-- Type Filters -->
      <div class="type-filters">
        <button class="filter-btn" *ngFor="let type of eventTypes" [ngClass]="{ 'active': activeType === type.key }" (click)="setType(type.key)">
          <i class="fas {{ type.icon }}"></i> {{ type.name }}
        </button>
      </div>

      <!-- Events List -->
      <div class="events-list">
        <div class="event-item" *ngFor="let event of activeEvents">
          <div class="row g-0">
            <div class="col-md-4">
              <div class="event-image">
                <img [src]="event.image" [alt]="event.title" loading="lazy">
              </div>
            </div>
            <div class="col-md-8">
              <div class="event-content">
                <div class="event-date-box">
                  <span class="event-day">{{ event.day }}</span>
                  <span class="event-month">{{ event.month }}</span>
                </div>
                <div class="event-info">
                  <div class="event-type-badge">{{ event.type }}</div>
                  <h3 class="event-title">{{ event.title }}</h3>
                  <p class="event-description">{{ event.description }}</p>
                  <div class="event-meta">
                    <span><i class="fas fa-clock"></i> {{ event.time }}</span>
                    <span><i class="fas fa-map-marker-alt"></i> {{ event.location }}</span>
                  </div>
                  <button class="btn btn-event" *ngIf="!showPastEvents">
                    <i class="fas fa-ticket-alt me-2"></i> Reservar lugar
                  </button>
                  <button class="btn btn-event-outline" *ngIf="showPastEvents">
                    <i class="fas fa-images me-2"></i> Ver galería
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state text-center py-5" *ngIf="activeEvents.length === 0">
        <i class="fas fa-calendar-alt fa-3x text-muted mb-3"></i>
        <h4>No se encontraron eventos</h4>
        <p class="text-muted">No hay eventos disponibles para esta categoría.</p>
      </div>
    </div>
  </section>
</div>
