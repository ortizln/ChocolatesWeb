<div class="blog-page">
  <section class="page-header">
    <div class="container">
      <div class="page-header-content text-center">
        <h1 class="page-title">Nuestro Blog</h1>
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb justify-content-center">
            <li class="breadcrumb-item"><a routerLink="/">Inicio</a></li>
            <li class="breadcrumb-item active">Blog</li>
          </ol>
        </nav>
      </div>
    </div>
  </section>

  <section class="blog-section">
    <div class="container">
      <!-- Category Filters -->
      <div class="category-filters">
        <button class="filter-btn" *ngFor="let cat of categories" [ngClass]="{ 'active': activeCategory === cat.key }" (click)="setCategory(cat.key)">
          <i class="fas {{ cat.icon }}"></i> {{ cat.name }}
        </button>
      </div>

      <!-- Blog Posts Grid -->
      <div class="row g-4">
        <div class="col-lg-4 col-md-6" *ngFor="let post of filteredPosts">
          <div class="blog-card">
            <div class="blog-image">
              <img [src]="post.image" [alt]="post.title" loading="lazy">
              <span class="blog-category">{{ post.category }}</span>
            </div>
            <div class="blog-info">
              <div class="blog-meta">
                <span class="meta-author">
                  <img [src]="post.authorAvatar" [alt]="post.author" class="author-avatar-sm">
                  {{ post.author }}
                </span>
                <span><i class="fas fa-calendar-alt"></i> {{ post.date }}</span>
              </div>
              <h4 class="blog-title">{{ post.title }}</h4>
              <p class="blog-summary">{{ post.summary }}</p>
              <div class="blog-tags">
                <span class="blog-tag" *ngFor="let tag of post.tags">#{{ tag }}</span>
              </div>
              <a [routerLink]="['/blog', post.slug]" class="blog-read-more">
                Leer más <i class="fas fa-arrow-right ms-1"></i>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State -->
      <div class="empty-state text-center py-5" *ngIf="filteredPosts.length === 0">
        <i class="fas fa-newspaper fa-3x text-muted mb-3"></i>
        <h4>No hay publicaciones en esta categoría</h4>
        <p class="text-muted">Pronto estaremos publicando contenido nuevo.</p>
        <button class="btn btn-purple" (click)="setCategory('todas')">Ver todas</button>
      </div>

      <!-- Pagination -->
      <nav class="blog-pagination" aria-label="Page navigation" *ngIf="filteredPosts.length > 0">
        <ul class="pagination justify-content-center">
          <li class="page-item" [ngClass]="{ 'disabled': currentPage === 1 }">
            <a class="page-link" (click)="goToPage(currentPage - 1)" aria-label="Anterior"><i class="fas fa-chevron-left"></i></a>
          </li>
          <li class="page-item" *ngFor="let page of getPages()" [ngClass]="{ 'active': page === currentPage }">
            <a class="page-link" (click)="goToPage(page)">{{ page }}</a>
          </li>
          <li class="page-item" [ngClass]="{ 'disabled': currentPage === totalPages }">
            <a class="page-link" (click)="goToPage(currentPage + 1)" aria-label="Siguiente"><i class="fas fa-chevron-right"></i></a>
          </li>
        </ul>
      </nav>
    </div>
  </section>
</div>
