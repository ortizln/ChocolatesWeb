<div class="page-header">
  <h2>{{ isEdit ? 'Editar Post' : 'Nuevo Post' }}</h2>
  <a routerLink="/blog" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
</div>

<div class="content-wrapper">
  <div class="form-container" style="max-width:1000px;" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-8">
          <div class="mb-3">
            <label class="form-label fw-semibold">Título *</label>
            <input type="text" class="form-control" formControlName="titulo" placeholder="Título del post" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Extracto</label>
            <textarea class="form-control" formControlName="extracto" rows="3" placeholder="Breve descripción que aparece en listados"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Contenido *</label>
            <textarea class="form-control" formControlName="contenido" rows="15" placeholder="Escribe aquí el contenido del post..."></textarea>
            <small class="text-muted">Puedes usar HTML básico para formato</small>
          </div>
        </div>
        <div class="col-md-4">
          <div class="mb-3">
            <label class="form-label fw-semibold">Imagen Destacada
              <span class="image-info-btn" (click)="showImageInfo = !showImageInfo" title="Recomendaciones">
                <i class="fas fa-info-circle"></i>
              </span>
            </label>
            <div class="upload-info-box" *ngIf="showImageInfo">
              <i class="fas fa-lightbulb"></i>
              <span>Formato: JPG, PNG o WebP · Tamaño recomendado: 1200x630px · Máx: 2MB</span>
            </div>
            <div class="image-upload-wrapper" (click)="fileInput.click()">
              <img *ngIf="previewImage" [src]="previewImage" class="preview-img" />
              <div *ngIf="!previewImage" class="upload-placeholder">
                <i class="fas fa-cloud-upload-alt fa-3x"></i>
              </div>
            </div>
            <input #fileInput type="file" accept="image/*" (change)="onImageSelected($event)" class="d-none" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Autor *</label>
            <input type="text" class="form-control" formControlName="autor" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Categoría</label>
            <input type="text" class="form-control" formControlName="categoria" placeholder="Ej: Noticias, Recetas" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Etiquetas</label>
            <div class="input-group mb-2">
              <input type="text" class="form-control" [(ngModel)]="tagInput" [ngModelOptions]="{standalone: true}" placeholder="Nueva etiqueta" (keyup.enter)="addTag()" />
              <button class="btn btn-outline-primary" type="button" (click)="addTag()"><i class="fas fa-plus"></i></button>
            </div>
            <div class="d-flex flex-wrap gap-1">
              <span class="badge bg-primary d-inline-flex align-items-center gap-1" *ngFor="let tag of (form.get('tags')?.value || [])">
                {{ tag }}
                <i class="fas fa-times" style="cursor:pointer" (click)="removeTag(tag)"></i>
              </span>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Estado</label>
            <select class="form-select" formControlName="estado">
              <option value="BORRADOR">Borrador</option>
              <option value="PUBLICADO">Publicado</option>
              <option value="PROGRAMADO">Programado</option>
            </select>
          </div>
          <div class="mb-3" *ngIf="form.get('estado')?.value === 'PROGRAMADO'">
            <label class="form-label fw-semibold">Fecha de Programación</label>
            <input type="datetime-local" class="form-control" formControlName="fechaProgramacion" />
          </div>
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="form.invalid || submitting">
          <i class="fas fa-save"></i> {{ isEdit ? 'Actualizar' : 'Publicar' }}
        </button>
        <a routerLink="/blog" class="btn btn-outline-secondary">Cancelar</a>
      </div>
    </form>
  </div>

  <div class="text-center py-5" *ngIf="loading">
    <div class="spinner-border text-primary" role="status"></div>
  </div>
</div>
