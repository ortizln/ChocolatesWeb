<div class="page-header">
  <h2><i class="fas fa-hashtag"></i> Etiquetas</h2>
  <button class="btn btn-primary" (click)="openNew()"><i class="fas fa-plus"></i> Nueva Etiqueta</button>
</div>

<div class="content-wrapper">
  <div class="row g-4">
    <div class="col-12" [class.col-lg-7]="showForm">
      <div class="table-container">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>Nombre</th>
                <th>Slug</th>
                <th>Estado</th>
                <th style="width:100px;">Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let tag of tags">
                <td><span class="badge bg-light text-dark fs-6 px-3 py-2">{{ tag.nombre }}</span></td>
                <td><code>{{ tag.slug }}</code></td>
                <td><span class="badge-status" [class.active]="tag.activo" [class.inactive]="!tag.activo">{{ tag.activo ? 'Activo' : 'Inactivo' }}</span></td>
                <td>
                  <div class="d-flex gap-1">
                    <button class="btn-action" style="background:#e3f2fd;color:#1565c0;" (click)="openEdit(tag)"><i class="fas fa-edit"></i></button>
                    <button class="btn-action" style="background:#fbe9e7;color:#c62828;" (click)="onDelete(tag.id)"><i class="fas fa-trash"></i></button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="tags.length === 0">
                <td colspan="4" class="text-center py-4 text-muted">No hay etiquetas</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-5" *ngIf="showForm">
      <div class="form-container">
        <h5 class="mb-3">{{ editingTag ? 'Editar' : 'Nueva' }} Etiqueta</h5>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre *</label>
            <input type="text" class="form-control" formControlName="nombre" placeholder="Nombre de la etiqueta" />
          </div>
          <div class="mb-3">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" formControlName="activo" id="tag-activo" />
              <label class="form-check-label" for="tag-activo">Etiqueta Activa</label>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
              <i class="fas fa-save"></i> {{ editingTag ? 'Actualizar' : 'Crear' }}
            </button>
            <button type="button" class="btn btn-outline-secondary" (click)="cancel()">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
