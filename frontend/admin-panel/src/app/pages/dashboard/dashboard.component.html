<div class="page-header">
  <h2><i class="fas fa-chart-pie"></i> Dashboard</h2>
  <span class="text-muted">Bienvenido al panel de administración</span>
</div>

<div class="content-wrapper">
  <div class="row g-4 mb-4">
    <div class="col-12 col-sm-6 col-xl-3" *ngFor="let stat of statCards">
      <div class="stat-card">
        <div class="stat-icon" [style.background]="stat.bg">
          <i class="fas" [class]="stat.icon" [style.color]="stat.color"></i>
        </div>
        <div class="stat-value">{{ stat.value }}</div>
        <div class="stat-label">{{ stat.label }}</div>
      </div>
    </div>
  </div>

  <div class="row g-4 mb-4">
    <div class="col-12 col-lg-8">
      <div class="chart-container">
        <h5 class="mb-3"><i class="fas fa-chart-line"></i> Visitas por Día</h5>
        <canvas baseChart
          [type]="visitasPorDia.type"
          [data]="visitasPorDia.data"
          [options]="visitasPorDia.options">
        </canvas>
      </div>
    </div>
    <div class="col-12 col-lg-4">
      <div class="chart-container">
        <h5 class="mb-3"><i class="fas fa-heart"></i> Likes por Producto</h5>
        <canvas baseChart
          [type]="likesPorProducto.type"
          [data]="likesPorProducto.data"
          [options]="likesPorProducto.options">
        </canvas>
      </div>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-12 col-lg-6">
      <div class="table-container">
        <h5 class="mb-3"><i class="fas fa-star"></i> Productos Más Vendidos</h5>
        <table class="table table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Producto</th>
              <th class="text-end">Ventas</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of topProducts; let i = index">
              <td>{{ i + 1 }}</td>
              <td>
                <a [routerLink]="['/products', p.id, 'edit']" class="text-decoration-none">{{ p.nombre }}</a>
              </td>
              <td class="text-end fw-bold">{{ p.ventas }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="col-12 col-lg-6">
      <div class="table-container">
        <h5 class="mb-3"><i class="fas fa-newspaper"></i> Posts Más Visitados</h5>
        <table class="table table-hover">
          <thead>
            <tr>
              <th>#</th>
              <th>Post</th>
              <th class="text-end">Visitas</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let p of topPosts; let i = index">
              <td>{{ i + 1 }}</td>
              <td>
                <a [routerLink]="['/blog', p.id, 'edit']" class="text-decoration-none">{{ p.titulo }}</a>
              </td>
              <td class="text-end fw-bold">{{ p.visitas }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
