<div class="page-header">
  <h2><i class="fas fa-chart-pie" style="color: var(--primary)"></i> Dashboard</h2>
  <span class="text-muted">Bienvenido al panel de administración</span>
</div>

<div class="row g-3 mb-4">
  <div class="col-12 col-sm-6 col-xl-3" *ngFor="let stat of statCards">
    <div class="stat-card">
      <div class="stat-icon" [style.background]="stat.bg">
        <i class="fas" [class]="stat.icon" [style.color]="stat.color"></i>
      </div>
      <div class="stat-body">
        <div class="stat-value">{{ stat.value }}</div>
        <div class="stat-label">{{ stat.label }}</div>
      </div>
      <div class="stat-trend up" *ngIf="stat.trend !== undefined">
        <i class="fas fa-arrow-up"></i> {{ stat.trend }}%
      </div>
    </div>
  </div>
</div>

<div class="row g-3 mb-4">
  <div class="col-12 col-lg-8">
    <div class="chart-card">
      <h6><i class="fas fa-chart-line" style="color: var(--primary)"></i> Visitas por Día</h6>
      <canvas baseChart
        [type]="visitasPorDia.type"
        [data]="visitasPorDia.data"
        [options]="visitasPorDia.options">
      </canvas>
    </div>
  </div>
  <div class="col-12 col-lg-4">
    <div class="chart-card">
      <h6><i class="fas fa-heart" style="color: var(--secondary)"></i> Likes por Producto</h6>
      <canvas baseChart
        [type]="likesPorProducto.type"
        [data]="likesPorProducto.data"
        [options]="likesPorProducto.options">
      </canvas>
    </div>
  </div>
</div>

<div class="row g-3">
  <div class="col-12 col-lg-6">
    <div class="table-container">
      <div class="table-toolbar">
        <h6 class="mb-0"><i class="fas fa-star" style="color: var(--warning)"></i> Productos Más Vendidos</h6>
      </div>
      <table class="responsive-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Producto</th>
            <th class="text-end">Ventas</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of topProducts; let i = index">
            <td data-label="#">{{ i + 1 }}</td>
            <td data-label="Producto">
              <a [routerLink]="['/products', p.id, 'edit']" class="text-decoration-none fw-medium" style="color: var(--primary)">{{ p.nombre }}</a>
            </td>
            <td data-label="Ventas" class="text-end fw-bold">{{ p.ventas }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="col-12 col-lg-6">
    <div class="table-container">
      <div class="table-toolbar">
        <h6 class="mb-0"><i class="fas fa-newspaper" style="color: var(--secondary)"></i> Posts Más Visitados</h6>
      </div>
      <table class="responsive-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Post</th>
            <th class="text-end">Visitas</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let p of topPosts; let i = index">
            <td data-label="#">{{ i + 1 }}</td>
            <td data-label="Post">
              <a [routerLink]="['/blog', p.id, 'edit']" class="text-decoration-none fw-medium" style="color: var(--primary)">{{ p.titulo }}</a>
            </td>
            <td data-label="Visitas" class="text-end fw-bold">{{ p.visitas }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
